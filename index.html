<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lucky Pig Studio – BaoTio & HIT 1000</title>
  <meta name="description"
    content="Lucky Pig Studio presents BaoTio — your exclusive daily lucky number — and HIT 1000, the addictive one-tap tapping game." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Cinzel+Decorative:wght@700;900&family=Lato:wght@300;400;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --red: #C8102E;
      --gold: #FFD700;
      --hit-cyan: #00E5FF;
      --hit-purple: #6B3FBF;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Lato', sans-serif;
      background: #8B0000;
      color: #fff8e7;
      overflow-x: hidden;
    }

    .nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: rgba(139, 0, 0, 0.9);
      backdrop-filter: blur(12px);
      padding: 1rem 2.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav-logo {
      font-family: 'Cinzel Decorative', serif;
      font-size: 1.3rem;
      color: var(--gold);
      text-decoration: none;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at center, #C8102E, #8B0000);
      text-align: center;
      padding: 7rem 2rem 4rem;
    }

    .hero h1 {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(3rem, 6vw, 5rem);
      margin-bottom: 1rem;
    }

    .app-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(480px, 1fr));
      gap: 3rem;
      max-width: 1100px;
      margin: 4rem auto;
      padding: 0 2rem;
    }

    .app-card {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 2.5rem;
      transition: transform 0.3s;
      text-align: center;
    }

    .app-card:hover {
      transform: translateY(-12px);
    }

    .baotio-card {
      border: 3px solid var(--gold);
    }

    .hit-card {
      border: 3px solid var(--hit-cyan);
    }

    .btn {
      display: inline-block;
      padding: 1rem 2.5rem;
      border-radius: 12px;
      font-weight: 700;
      text-decoration: none;
      margin-top: 1.5rem;
    }

    .btn-baotio {
      background: var(--gold);
      color: #1a0a00;
    }

    .btn-hit {
      background: var(--hit-cyan);
      color: #1a0a00;
    }
  </style>
</head>

<body>
  <nav class="nav">
    <a href="index.html" class="nav-logo">🐷 Lucky Pig Studio</a>
    <div>
      <a href="baotio.html" style="color:#fff8e7; margin-right:2rem; text-decoration:none;">BaoTio</a>
      <a href="hit1000.html" style="color:#00E5FF; text-decoration:none;">HIT 1000</a>
    </div>
  </nav>

  <section class="hero">
    <div>
      <h1>Lucky Pig Studio</h1>
      <p style="font-size:1.4rem; max-width:620px; margin:0 auto 2rem;">
        Two addictive games.<br>One studio based in Singapore.
      </p>
      <div class="app-cards">
        <!-- BaoTio Card -->
        <div class="app-card baotio-card">
          <h2 style="color:var(--gold); font-size:2.2rem; margin-bottom:0.5rem;">BaoTio</h2>
          <p style="font-size:1.1rem; opacity:0.9;">Your exclusive daily lucky number for Singapore 4D &amp; Toto</p>
          <a href="baotio.html" class="btn btn-baotio">Explore BaoTio →</a>
        </div>
        <!-- HIT 1000 Card -->
        <div class="app-card hit-card">
          <h2 style="color:var(--hit-cyan); font-size:2.2rem; margin-bottom:0.5rem;">HIT 1000</h2>
          <p style="font-size:1.1rem; opacity:0.9;">The ultra-satisfying one-tap tapping game</p>
          <a href="hit1000.html" class="btn btn-hit">Play HIT 1000 →</a>
        </div>
      </div>
    </div>
  </section>
</body>

</html>
